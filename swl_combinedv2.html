<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SWL — AI Solutions Portfolio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--border:#2a2a2a;--border2:#333;--gold:#C9A84C;--gold2:#D4A843;--gold-dim:#C9A84C18;--text:#fff;--text2:#aaa;--text3:#666;--green:#22c55e;--green-dim:#22c55e15;--amber:#f59e0b;--amber-dim:#f59e0b15;--red:#ef4444;--red-dim:#ef444415}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}::-webkit-scrollbar-thumb:hover{background:#444}*{scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg2)}
/* HEADER */
.mhdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}.logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px}.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hbadge{background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px;border:1px solid #C9A84C33}
.hdr-r{display:flex;align-items:center;gap:10px}
.ltog{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.lbtn{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.3px}
.lbtn.active{background:var(--gold);color:#000}.lbtn:hover:not(.active){color:var(--text);background:var(--bg4)}
/* MASTER TABS */
.mtabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 18px;flex-shrink:0}
.mtab{padding:9px 16px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap}
.mtab:hover{color:var(--text2)}.mtab.active{color:var(--text);border-bottom-color:var(--gold)}
/* CONTENT */
.mcontent{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
/* INNER TABS */
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 18px;flex-shrink:0;overflow-x:auto}
.tabs-bar::-webkit-scrollbar{height:0}
.tab-btn{padding:8px 13px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}.tab-btn.active{color:var(--text);border-bottom-color:var(--gold)}
.tab-badge{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.content{flex:1;min-height:0;overflow:hidden;position:relative}
.tab-panel{display:none;position:absolute;inset:0;overflow:hidden;flex-direction:column}.tab-panel.active{display:flex}
/* BTN */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
.btn-out{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-out:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:transparent;color:var(--red);border:1px solid #ef444430}.btn-danger:hover{background:var(--red-dim)}
.btn-save{background:transparent;color:var(--gold);border:1px solid #C9A84C44}.btn-save:hover{background:var(--gold-dim)}
.btn-blue{background:transparent;color:#60a5fa;border:1px solid #3b82f644}.btn-blue:hover{background:#3b82f618}
.btn-sm{padding:5px 9px;font-size:11px}
/* INPUTS */
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:var(--text)}
.inp::placeholder{color:var(--text3)}.inp:focus{border-color:#C9A84C55}select.inp option{background:var(--bg3)}
.textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;outline:none;color:var(--text);resize:vertical;width:100%;min-height:70px;line-height:1.5}.textarea:focus{border-color:#C9A84C55}
.tb{display:inline-block;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700}
.t1{background:var(--green-dim);color:var(--green);border:1px solid #22c55e25}
.t2{background:var(--amber-dim);color:var(--amber);border:1px solid #f59e0b25}
.t3{background:var(--red-dim);color:var(--red);border:1px solid #ef444425}
/* HOME SHARED */
.hscroll{flex:1;overflow-y:auto;min-height:0}
.hhero{position:relative;overflow:hidden;min-height:210px;display:flex;align-items:center;padding:38px 48px}
.hhero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0a 0%,#1a1208 40%,#2a1a06 70%,#0a0a0a 100%)}
.hhero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.06) 1px,transparent 1px);background-size:40px 40px}
.hhero-glow{position:absolute;top:-80px;right:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.14) 0%,transparent 70%);pointer-events:none}
.himg{position:absolute;right:0;top:0;bottom:0;width:340px;overflow:hidden;opacity:.24}.himg img{width:100%;height:100%;object-fit:cover}
.hcontent{position:relative;z-index:1;max-width:580px}
.heyebrow{display:inline-flex;align-items:center;gap:7px;background:var(--gold-dim);border:1px solid #C9A84C33;border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:.3px;margin-bottom:12px}
.hcontent h1{font-size:34px;font-weight:900;letter-spacing:-1.5px;line-height:1.08;margin-bottom:10px}.hcontent h1 span{color:var(--gold)}
.hcontent p{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:18px;max-width:480px}
.hactions{display:flex;gap:10px;flex-wrap:wrap}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.sitem{padding:13px 20px;border-right:1px solid var(--border)}.sitem:last-child{border-right:none}
.sval{font-size:22px;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.slabel{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}.ssub{font-size:10px;color:var(--text3);margin-top:2px;opacity:.7}
.hsect{padding:18px 28px}
.hsect-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:13px}
.hsect-hd h2{font-size:16px;font-weight:800;letter-spacing:-.4px}.hsect-hd p{font-size:12px;color:var(--text3);margin-top:2px}.hsect-hd a{font-size:12px;color:var(--gold);cursor:pointer}
.plat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.pill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .2s}
.pcard:hover{border-color:#C9A84C44;transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.pcard-img{height:100px;overflow:hidden;position:relative}.pcard-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}.pcard:hover .pcard-img img{transform:scale(1.05)}
.pcard-img-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(17,17,17,.9) 100%)}
.pcard-badge{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:var(--text2);backdrop-filter:blur(4px)}
.pcard-body{padding:9px 11px 11px}
.pcard-sys{font-size:10px;font-weight:700;margin-bottom:1px}
.pcard-name{font-size:12px;font-weight:700;margin-bottom:2px}.pcard-subname{font-size:11px;font-weight:600;margin-bottom:2px;color:var(--text2)}
.pcard-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:5px}
.pcard-impact{font-size:10px;color:var(--green);margin-bottom:5px}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-cnt{font-size:10px;color:var(--text3)}.pcard-range{font-size:11px;font-weight:700;color:var(--gold);font-family:monospace}
.why-sect{padding:18px 28px;border-top:1px solid var(--border);background:var(--bg2)}
.why-sect h2{font-size:15px;font-weight:800;letter-spacing:-.4px;margin-bottom:12px}
.why-grid{display:grid;gap:9px}.why-grid-3{grid-template-columns:repeat(3,1fr)}.why-grid-4{grid-template-columns:repeat(4,1fr)}
.wcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.wicon{font-size:17px;margin-bottom:6px}.wtitle{font-size:12px;font-weight:700;margin-bottom:3px}.wdesc{font-size:11px;color:var(--text3);line-height:1.5}
/* QUOTER */
.ql{flex-direction:row !important}
.sidebar{width:182px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto}
.sidebar-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 13px 4px}
.pbtn{width:100%;text-align:left;padding:7px 12px;border:none;border-bottom:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;transition:all .12s}
.pbtn:hover{background:var(--bg3);color:var(--text)}.pbtn.active{background:var(--bg3);border-left:2px solid var(--gold);padding-left:10px;color:var(--text)}
.pbtn .ps{font-size:10px;font-weight:700;margin-bottom:1px;color:var(--gold)}.pbtn .pn{font-weight:600;font-size:11px;line-height:1.3}.pbtn .pm{font-size:10px;color:var(--text3);margin-top:1px}
.aarea{flex:1;overflow-y:auto;padding:12px 14px;min-width:0}
.asy{font-size:12px;font-weight:700;margin-bottom:1px;color:var(--gold)}.atitle{font-size:13px;font-weight:700;margin-bottom:2px}.asub{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.5}
.srow{display:flex;gap:6px;margin-bottom:8px}
.tsect{margin-bottom:11px}
.tshd{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;border-radius:7px;margin-bottom:4px;cursor:pointer;user-select:none}
.tshd.light{background:#22c55e12;border:1px solid #22c55e20}.tshd.full{background:#f59e0b12;border:1px solid #f59e0b20}.tshd.addon{background:#ef444412;border:1px solid #ef444420}
.thl{display:flex;align-items:center;gap:7px}.thr{display:flex;align-items:center;gap:7px}
.thlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}.thlbl.light{color:var(--green)}.thlbl.full{color:var(--amber)}.thlbl.addon{color:var(--red)}
.thcnt{font-size:10px;color:var(--text3)}
.bbadge{font-size:10px;font-weight:600;color:var(--gold);background:var(--gold-dim);border:1px solid #C9A84C33;padding:1px 7px;border-radius:99px}
.tselbtn{font-size:10px;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 7px;cursor:pointer;font-family:'Inter',sans-serif}.tselbtn:hover{color:var(--gold);border-color:#C9A84C44}
.cards{display:flex;flex-direction:column;gap:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:all .12s}
.card:hover{border-color:var(--border2);background:var(--bg3)}.card.sel{border-color:#C9A84C66;background:var(--gold-dim)}
.chk{width:15px;height:15px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#000}
.card.sel .chk{background:var(--gold);border-color:var(--gold)}
.cinfo{flex:1;min-width:0}.cname{font-weight:600;font-size:11px}
.cmeta{display:flex;gap:5px;margin-top:2px;flex-wrap:wrap;align-items:center}.cprice{font-size:10px;color:var(--text3)}
.cret{display:flex;align-items:center;gap:4px;margin-top:2px}.cret-lbl{font-size:10px;color:var(--text3)}.cret-val{font-size:10px;color:var(--gold)}
.cnote{font-size:10px;color:var(--text3);font-style:italic;margin-top:2px}
.dchip{font-size:10px;color:var(--green);font-weight:600;background:var(--green-dim);border:1px solid #22c55e25;border-radius:4px;padding:1px 6px;margin-left:4px}
/* QUOTE PANEL */
.qp{width:336px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.qph{padding:10px 13px;border-bottom:1px solid var(--border);flex-shrink:0}.qph h3{font-size:13px;font-weight:700}.qph p{font-size:11px;color:var(--text3);margin-top:1px}
.qinp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:6px 10px;font-size:12px;font-family:'Inter',sans-serif;margin-top:7px;outline:none;color:var(--text)}
.qinp::placeholder{color:var(--text3)}.qinp:focus{border-color:#C9A84C55}
.qlist{flex:1;overflow-y:auto;padding:7px 12px}
.qempty{text-align:center;padding:24px 12px;color:var(--text3);font-size:12px}
.qi{padding:7px 0;border-bottom:1px solid var(--border)}.qi:last-child{border-bottom:none}
.qitop{display:flex;align-items:flex-start;gap:6px}.qiinfo{flex:1;min-width:0}.qiname{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.qiplat{font-size:10px;color:var(--text3);margin-bottom:4px}
.qirm{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0 2px;flex-shrink:0;line-height:1}.qirm:hover{color:var(--red)}
.qinums{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 9px;font-size:11px;font-family:monospace;margin-top:4px}
.qirow{display:flex;justify-content:space-between;margin-bottom:3px}.qirow:last-child{margin-bottom:0}
.qilbl{color:var(--text3);font-family:'Inter',sans-serif;font-size:10px}.qival{font-weight:600}.qidisc{color:var(--green)}.qisub{color:var(--gold);font-weight:700}
.qivrow{display:flex;align-items:center;gap:4px;margin-top:4px;background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:3px 7px}
.qivrow label{font-size:10px;color:var(--text3);white-space:nowrap;font-family:'Inter',sans-serif}
.qivrow input{background:transparent;border:none;outline:none;color:var(--gold);font-size:11px;font-family:monospace;width:58px;font-weight:600}
.qivextra{font-size:10px;color:var(--text3);font-family:'Inter',sans-serif}
/* TOTALS */
.qtot{padding:10px 13px;border-top:1px solid var(--border);background:var(--bg3);flex-shrink:0;font-size:11px}
.qtsect{margin-bottom:7px}.qtsect:last-child{margin-bottom:0}
.qtsect-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.qtrow{display:flex;justify-content:space-between;margin-bottom:2px}.qtrow:last-child{margin-bottom:0}
.qtlbl{color:var(--text3)}.qtval{font-weight:700;font-family:monospace}.qtdisc{color:var(--green)}.qtsub{color:var(--gold);font-weight:700}
.qtbig{font-size:13px;font-weight:800;color:var(--gold)}.qtbiglbl{font-size:12px;font-weight:700;color:var(--text2)}
.commit-row{display:flex;gap:5px;margin-bottom:6px}
.cmbtn{flex:1;padding:5px 4px;border-radius:6px;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);text-align:center;transition:all .15s}
.cmbtn:hover{color:var(--text)}.cmbtn.active{background:var(--gold-dim);color:var(--gold);border-color:#C9A84C44}
.pkgsel{padding:7px 9px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;margin-bottom:6px}
.pkgsel label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.qact{padding:8px 12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
/* PROJECTS */
.pscroll{flex:1;overflow-y:auto;padding:20px 24px;min-height:0}
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}.phdr h2{font-size:16px;font-weight:700}
.pjcard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;transition:all .15s;margin-bottom:9px}
.pjcard:hover{border-color:#C9A84C44}.pjcard.apj{border-color:var(--gold);background:var(--gold-dim)}
.pjhead{display:flex;align-items:flex-start;gap:10px}
.pjicon{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pjinfo{flex:1;min-width:0}.pjname{font-weight:700;font-size:13px;margin-bottom:2px}.pjmeta{font-size:11px;color:var(--text3);margin-bottom:5px}
.pjagents{display:flex;gap:4px;flex-wrap:wrap}.pjchip{font-size:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--text2);white-space:nowrap}
.pjcol{display:flex;gap:5px;flex-direction:column;align-items:flex-end;flex-shrink:0}
.pjtot{text-align:right}.pjset{font-size:11px;color:var(--text3)}.pjret{font-size:13px;font-weight:700;color:var(--gold);font-family:monospace}
.abadge{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid #C9A84C44}
.vbadge{background:var(--bg3);color:var(--text3);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;border:1px solid var(--border2)}
.vacc{margin-top:9px;border-top:1px solid var(--border);padding-top:9px}
.vrow{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}.vrow:last-child{border-bottom:none}
.vinfo{flex:1}.vlbl{font-size:11px;font-weight:600}.vmeta{font-size:10px;color:var(--text3)}
.pj-empty{text-align:center;padding:60px 20px;color:var(--text3)}
/* COMPARE */
.cmpscroll{flex:1;overflow-y:auto;padding:18px 22px;min-height:0}
.cmphdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}.cmphdr h2{font-size:16px;font-weight:700}
.cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.cmpcol{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cmpcolhd{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}.cmpcolhd h3{font-size:12px;font-weight:700}
.cmpcolb{padding:11px 13px}.cmpempty{text-align:center;padding:20px;color:var(--text3);font-size:12px}
.cmparow{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px}.cmparow:last-child{border-bottom:none}
.cmpsum{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px}
.cmprow{display:grid;grid-template-columns:185px 1fr 1fr;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:center;font-size:12px}.cmprow:last-child{border-bottom:none}.cmprow.hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.cmpm{color:var(--text3)}.cmpv{font-weight:700;font-family:monospace}.cmpw{color:var(--green)}

// ── HELPERS ──
function mka(o){return Object.assign({varValue:o.varDefault||o.varMin||0},o);}
function fmtN(n){return Math.round(n).toLocaleString('en-US');}
function todayStr(lang){return new Date().toLocaleDateString(lang==='es'?'es-AR':'en-US',{year:'numeric',month:'long',day:'numeric'});}

// ── SHARED LOGIC ──
const _sharedMixin={
  t(k){return(this._i18n[this.lang]||this._i18n.en)[k]||k;},
  setLang(l){this.lang=l;try{localStorage.setItem('swl_master_lang',l);}catch(e){}},
  fmtN,
  today(){return todayStr(this.lang);},
  toggleSection(key){this.secOpen[key]=!this.secOpen[key];},
  computedRetainerStr(item){
    const b=item.retainerNum||0;if(!item.varLabel)return(item.retainerBase||'$'+fmtN(b))+'/mo fixed';
    const ov=Math.max(0,(item.varValue||0)-(item.varMin||0));const vc=Math.round(ov*(item.varRate||0));
    if(vc===0)return(item.retainerBase||'$'+fmtN(b))+'/mo (base)';
    return'$'+fmtN(b)+'/mo + $'+fmtN(vc)+' = $'+fmtN(b+vc)+'/mo';
  },
  setupLow(){return this.quote.reduce((s,a)=>s+(a.setupLow||0),0);},
  setupHigh(){return this.quote.reduce((s,a)=>s+(a.setupHigh||0),0);},
  grossRetainer(){return this.quote.reduce((s,i)=>{const b=i.retainerNum||0;const o=Math.max(0,(i.varValue||0)-(i.varMin||0));return s+b+Math.round(o*(i.varRate||0));},0);},
  commitmentDiscount(){
    const rates={1:0,3:.10,6:.20,12:.30};const r=rates[this.commitment]||0;if(!r)return 0;
    return Math.round((this.grossRetainer()-this._bundleDisc())*r);
  },
  packageDiscount(){
    if(!this.activePackageId)return 0;const pkg=this.packages.find(p=>p.id===this.activePackageId);if(!pkg||!pkg.discount)return 0;
    return Math.round((this.grossRetainer()-this._bundleDisc()-this.commitmentDiscount())*pkg.discount/100);
  },
  retainerTotal(){return this.grossRetainer()-this._bundleDisc()-this.commitmentDiscount()-this.packageDiscount();},
  effectiveConditions(){return this.pdfMeta.useDefaultTerms?this.defaultTerms.conditions:this.pdfMeta.conditions;},
  effectiveNextSteps(){return this.pdfMeta.useDefaultTerms?this.defaultTerms.nextSteps:this.pdfMeta.nextSteps;},
  parseSetupRange(a){const pts=(a.setup||'').replace(/[$,]/g,'').split(/[–—-]/);if(pts.length>=2){const lo=parseFloat(pts[0]),hi=parseFloat(pts[1]);if(!isNaN(lo))a.setupLow=lo;if(!isNaN(hi))a.setupHigh=hi;}},
  rebuildShort(a){a.retainerShort=a.varLabel?(a.retainerBase||'$0')+'/mo+var':(a.retainerBase||'$0')+'/mo fixed';},
  applyLogoUrl(){this.customLogo=this.logoUrlInput;this.persist();},
  onLogoFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{this.customLogo=ev.target.result;this.logoUrlInput=ev.target.result;this.persist();};r.readAsDataURL(f);},
  openPdfCustomizer(){this.previewQ={name:this.projectName||'',agents:this.quote};this.showCustomizer=true;},
  openPdfCustomizerForProject(pi){this.previewQ={name:this.savedProjects[pi].name,agents:this.savedProjects[pi].agents};this.showCustomizer=true;},
  openPdfCustomizerForVersion(pi,vi){const v=this.savedProjects[pi].versions[vi];this.previewQ={name:this.savedProjects[pi].name+' v'+(vi+1),agents:v.agents};this.showCustomizer=true;},
  openPDF(){this.showCustomizer=false;this.showModal=true;},
  removeFromQuote(i){this.quote.splice(i,1);},
  clearQuote(){if(confirm(this.lang==='es'?'¿Limpiar la cotización?':'Clear the quote?')){this.quote=[];this.projectName='';this.currentProjectId=null;this.activePackageId='';this.commitment=1;}},
  loadProject(pi){const p=this.savedProjects[pi];this.quote=JSON.parse(JSON.stringify(p.agents));this.projectName=p.name;this.currentProjectId=p.id;this.activeTab='quoter';},
  loadVersion(pi,vi){const v=this.savedProjects[pi].versions[vi];this.quote=JSON.parse(JSON.stringify(v.agents));this.projectName=this.savedProjects[pi].name;this.currentProjectId=this.savedProjects[pi].id;this.activeTab='quoter';},
  deleteProject(pi){if(!confirm(this.lang==='es'?'¿Eliminar?':'Delete?'))return;if(this.currentProjectId===this.savedProjects[pi].id)this.currentProjectId=null;this.savedProjects.splice(pi,1);},
  clearAllProjects(){if(!confirm(this.lang==='es'?'¿Eliminar TODOS los proyectos?':'Delete ALL projects?'))return;this.savedProjects=[];this.currentProjectId=null;},
  loadCompareProject(side){const s=side==='A'?this.compareAId:this.compareBId;if(!s&&s!=='0')return;const idx=parseInt(s);if(isNaN(idx)||!this.savedProjects[idx])return;const p=this.savedProjects[idx];const agents=JSON.parse(JSON.stringify(p.agents));if(side==='A')this.compareA={name:p.name,agents};else this.compareB={name:p.name,agents};},
  loadCurrentToCompare(side){if(side==='A')this.compareA={name:this.projectName||'Current',agents:JSON.parse(JSON.stringify(this.quote))};else this.compareB={name:this.projectName||'Current',agents:JSON.parse(JSON.stringify(this.quote))};},
  _saveSnap(){
    if(!this.quote.length){alert(this.lang==='es'?'Agregá agentes primero.':'Add agents first.');return null;}
    return{date:new Date().toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}),agents:JSON.parse(JSON.stringify(this.quote)),setupLow:this.setupLow(),setupHigh:this.setupHigh(),retainerTotal:this.retainerTotal()};
  },
  saveProject(){
    const snap=this._saveSnap();if(!snap)return;
    const name=this.projectName||(this.lang==='es'?'Proyecto ':'Project ')+(this.savedProjects.length+1);
    const ei=this.savedProjects.findIndex(p=>p.id===this.currentProjectId);
    if(ei>=0){const proj=this.savedProjects[ei];if(!proj.versions)proj.versions=[];proj.versions.push(snap);proj.name=name;Object.assign(proj,{date:snap.date,agents:snap.agents,setupLow:snap.setupLow,setupHigh:snap.setupHigh,retainerTotal:snap.retainerTotal});}
    else{const id=Date.now();this.savedProjects.unshift({id,name,date:snap.date,agents:snap.agents,setupLow:snap.setupLow,setupHigh:snap.setupHigh,retainerTotal:snap.retainerTotal,versions:[snap],_showVersions:false});this.currentProjectId=id;}
    this.persist();const btn=event.target;const orig=btn.textContent;btn.textContent='✓ '+(this.lang==='es'?'Guardado!':'Saved!');setTimeout(()=>btn.textContent=orig,1500);
  },
  agentNetRetainer(item){
    const b=item.retainerNum||0;const ov=Math.max(0,(item.varValue||0)-(item.varMin||0));const g=b+Math.round(ov*(item.varRate||0));const d=this.getAgentDiscount(item);return Math.round(g*(1-d/100));
  },
  printPDF(elId){
    const content=document.getElementById(elId).innerHTML;
    const w=window.open('','_blank');
    w.document.write('<!DOCTYPE html><html><head><title>SWL Quote</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;font-size:12px;background:#fff;padding:26px 30px;max-width:760px;margin:0 auto;color:#1a1a1a}@media print{body{padding:16px}}</style></head><body>'+content+'</body></html>');
    w.document.close();setTimeout(()=>{w.focus();w.print();},500);
  }
};

function agentApp(){
  const base={
    _i18n:_I18N,
    activeTab:'home',activePlat:'growth',lang:'en',
    search:'',filterTier:0,setupSearch:'',setupPlatFilter:'',
    customLogo:'',logoUrlInput:'',
    quote:[],projectName:'',
    showModal:false,showCustomizer:false,showPlatModal:false,platModalData:null,
    platforms:[],savedProjects:[],currentProjectId:null,
    previewQ:{name:'',agents:[]},
    compareA:{name:'',agents:[]},compareB:{name:'',agents:[]},
    compareAId:'',compareBId:'',
    pdfMeta:{clientName:'',contactName:'',intro:'',priorities:'',conditions:'',nextSteps:'',useDefaultTerms:true},
    discounts:{light:{},lightFull:{}},packages:[],activePackageId:'',commitment:1,
    secOpen:{light:true,full:true,addon:true},setupSubTab:'discounts',
    defaultTerms:{conditions:'',nextSteps:''},_defaults:null,

    ..._sharedMixin,

    _bundleDisc(){return this.quote.reduce((s,item)=>{const d=this.getAgentDiscount(item);if(!d)return s;const b=item.retainerNum||0;const o=Math.max(0,(item.varValue||0)-(item.varMin||0));return s+Math.round((b+Math.round(o*(item.varRate||0)))*d/100);},0);},
    totalDiscount(){return this._bundleDisc();},

    getAgentDiscount(agent){
      const pid=this.platforms.find(p=>p.name===(agent.platform||agent._platformName))?.id;if(!pid)return 0;
      const p=this.platforms.find(pl=>pl.id===pid);if(!p)return 0;
      const plat=p.name;const tier=agent.tier;
      const same=p.agents.filter(a=>a.tier===tier);
      const sel=this.quote.filter(q=>q.platform===plat).map(q=>q.name);
      if(!same.every(a=>sel.includes(a.name)))return 0;
      if(tier===1){const t2=p.agents.filter(a=>a.tier===2);const allT2=t2.length>0&&t2.every(a=>sel.includes(a.name));return allT2?(this.discounts.lightFull[pid]||0):(this.discounts.light[pid]||0);}
      if(tier===2){const t1=p.agents.filter(a=>a.tier===1);const allT1=t1.length>0&&t1.every(a=>sel.includes(a.name));return allT1?(this.discounts.lightFull[pid]||0):0;}
      return 0;
    },
    activeBundleDiscount(){
      const p=this.currentPlatform();const pid=p.id;const plat=p.name;
      const t1=p.agents.filter(a=>a.tier===1);const t2=p.agents.filter(a=>a.tier===2);
      const sel=this.quote.filter(q=>q.platform===plat).map(q=>q.name);
      const aT1=t1.length>0&&t1.every(a=>sel.includes(a.name));const aT2=t2.length>0&&t2.every(a=>sel.includes(a.name));
      if(aT1&&aT2)return this.discounts.lightFull[pid]||0;if(aT1)return this.discounts.light[pid]||0;return 0;
    },
    activeBundleDiscountLabel(){const d=this.activeBundleDiscount();if(!d)return'';const p=this.currentPlatform();if(d===(this.discounts.lightFull[p.id]||0))return d+'% bundle — Light + Full selected';return d+'% bundle — Full Light selected';},
    tierSections(){
      const p=this.currentPlatform();const pid=p.id;
      return[{key:'light',label:this.t('lightDeployment'),agents:p.agents.filter(a=>a.tier===1),bundleDisc:this.discounts.light[pid]||0},{key:'full',label:this.t('fullDeployment'),agents:p.agents.filter(a=>a.tier===2),bundleDisc:this.discounts.lightFull[pid]||0},{key:'addon',label:this.t('addons'),agents:p.agents.filter(a=>a.tier===3),bundleDisc:0}];
    },
    allInSectionSelected(sec){const plat=this.currentPlatform().name;return sec.agents.length>0&&sec.agents.every(a=>this.quote.some(q=>q.name===a.name&&q.platform===plat));},
    selectAllInSection(sec){
      const plat=this.currentPlatform().name;
      if(this.allInSectionSelected(sec)){sec.agents.forEach(a=>{const i=this.quote.findIndex(q=>q.name===a.name&&q.platform===plat);if(i>=0)this.quote.splice(i,1);});}
      else{sec.agents.forEach(a=>{if(!this.quote.some(q=>q.name===a.name&&q.platform===plat))this.quote.push({...a,platform:plat,uid:Date.now()+Math.random(),varValue:a.varDefault||a.varMin||0});});}
    },
    isSelected(a){return this.quote.some(q=>q.name===a.name&&q.platform===this.currentPlatform().name);},
    toggleAgent(a){
      const plat=this.currentPlatform().name;const i=this.quote.findIndex(q=>q.name===a.name&&q.platform===plat);
      if(i>=0)this.quote.splice(i,1);else this.quote.push({...a,platform:plat,uid:Date.now()+Math.random(),varValue:a.varDefault||a.varMin||0});
    },
    totalAgents(){return this.platforms.reduce((s,p)=>s+p.agents.length,0);},
    currentPlatform(){return this.platforms.find(p=>p.id===this.activePlat)||this.platforms[0];},
    filtered(){return this.currentPlatform().agents.filter(a=>a.name.toLowerCase().includes(this.search.toLowerCase())&&(this.filterTier===0||a.tier===this.filterTier));},
    allAgentsFiltered(){
      let r=[];this.platforms.forEach(p=>p.agents.forEach(a=>r.push(a)));
      if(this.setupSearch){const q=this.setupSearch.toLowerCase();r=r.filter(a=>a.name.toLowerCase().includes(q)||(a._platformName||'').toLowerCase().includes(q));}
      if(this.setupPlatFilter){const pf=this.platforms.find(p=>p.id===this.setupPlatFilter);if(pf)r=r.filter(a=>a._platformName===pf.name);}
      return r;
    },
    openPlatModal(p){this.platModalData=p;this.showPlatModal=true;},
    goToQuoterFromModal(id){this.showPlatModal=false;this.activePlat=id;this.activeTab='quoter';this.search='';this.filterTier=0;},
    platModalAgents(p,type){if(!p)return[];if(type==='light')return p.agents.filter(a=>a.tier===1);if(type==='full')return p.agents.filter(a=>a.tier===2);return p.agents.filter(a=>a.tier===3);},
    platModalRetainer(p,type){return this.platModalAgents(p,type).reduce((s,a)=>s+(a.retainerNum||0),0);},
    platModalROI(p,type){const r=this.calcROI(this.platModalAgents(p,type));return r.roi+'x · '+r.hours+'h/mo';},
    calcROI(agents){
      let h=0,v=0;agents.forEach(a=>{const r=_AR[a.name]||{h:15,v:3000};h+=r.h;v+=r.v;});
      const mr=agents.reduce((s,i)=>s+(i.retainerNum||0),0);const sm=agents.reduce((s,a)=>s+((a.setupLow||0)+(a.setupHigh||0))/2,0);
      const roi=mr*12>0?Math.round((v/(mr*12))*10)/10:0;const pb=mr>0?Math.round(sm/Math.max(v/12-mr,1)):0;
      return{hours:h,roi:Math.max(roi,1),payback:Math.max(1,Math.min(pb,36))};
    },
    previewPlatforms(){return[...new Set(this.previewQ.agents.map(q=>q.platform))];},
    previewByPlatform(plat){return this.previewQ.agents.filter(q=>q.platform===plat);},
    compareSetupLow(side){return(side==='A'?this.compareA:this.compareB).agents.reduce((s,a)=>s+(a.setupLow||0),0);},
    compareRetainer(side){return(side==='A'?this.compareA:this.compareB).agents.reduce((s,i)=>{const b=i.retainerNum||0;const o=Math.max(0,(i.varValue||0)-(i.varMin||0));return s+b+Math.round(o*(i.varRate||0));},0);},
    syncQuoteAgent(agent){this.quote.forEach(qi=>{if(qi.name===agent.name&&qi.platform===agent._platformName){Object.assign(qi,{setup:agent.setup,setupLow:agent.setupLow,setupHigh:agent.setupHigh,tier:agent.tier,retainerBase:agent.retainerBase,retainerNum:agent.retainerNum,retainerShort:agent.retainerShort,varRate:agent.varRate,varMin:agent.varMin});}});},
    resetOneAgent(agent){const defP=this._defaults.find(p=>p.name===agent._platformName);if(!defP)return;const defA=defP.agents.find(a=>a.name===agent.name);if(!defA)return;const uid=agent._uid,pn=agent._platformName;Object.assign(agent,JSON.parse(JSON.stringify(defA)));agent._uid=uid;agent._platformName=pn;},
    resetAllAgents(){if(!confirm(this.lang==='es'?'¿Resetear TODOS los agentes?':'Reset ALL agents?'))return;this.platforms=this._buildPlats();},
    resetPlatImg(pid){const p=this.platforms.find(pl=>pl.id===pid);if(p){p.img=_IMGS[pid]||p.img;this.persist();}},
    onPlatFile(e,pid){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const p=this.platforms.find(pl=>pl.id===pid);if(p){p.img=ev.target.result;this.persist();}};r.readAsDataURL(f);},
    resetDefaultTerms(){this.defaultTerms.conditions=this.lang==='es'?_DC_ES:_DC_EN;this.defaultTerms.nextSteps=this.lang==='es'?_NS_ES:_NS_EN;this.persist();},
    applyDefaultTerms(){this.pdfMeta.conditions=this.defaultTerms.conditions;this.pdfMeta.nextSteps=this.defaultTerms.nextSteps;},
    printPDF(){_sharedMixin.printPDF.call(this,'ag-pdf');},
    exportComparePDF(){
      const rA=this.calcROI(this.compareA.agents),rB=this.calcROI(this.compareB.agents);
      const w=window.open('','_blank');
      w.document.write('<!DOCTYPE html><html><head><title>SWL Compare</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;font-size:12px;background:#fff;padding:28px 32px;color:#1a1a1a}h1{font-size:18px;font-weight:800;margin-bottom:4px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.col{border:1px solid #eee;border-radius:8px;padding:14px}.col h2{font-size:13px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee}table{width:100%;border-collapse:collapse;font-size:11px}th{text-align:left;padding:5px 7px;background:#f8f8f8;font-weight:600;color:#666;font-size:10px;border-bottom:1px solid #eee}td{padding:5px 7px;border-bottom:1px solid #f5f5f5}.summary{border:1px solid #eee;border-radius:8px;padding:14px}.summary h2{font-size:13px;font-weight:700;margin-bottom:10px}.row{display:grid;grid-template-columns:160px 1fr 1fr;gap:10px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:11px}.metric{color:#888}.val{font-weight:700;font-family:monospace}@media print{body{padding:16px}}</style></head><body>');
      w.document.write('<h1>SWL Scenario Comparison</h1><p style="font-size:11px;color:#888;margin-bottom:20px">SWL Consulting · '+this.today()+'</p>');
      w.document.write('<div class="grid"><div class="col"><h2>'+(this.compareA.name||'A')+'</h2><table><thead><tr><th>Agent</th><th>Retainer</th></tr></thead><tbody>'+this.compareA.agents.map(a=>'<tr><td>'+a.name+'</td><td>$'+fmtN(a.retainerNum||0)+'/mo</td></tr>').join('')+'</tbody></table></div>');
      w.document.write('<div class="col"><h2>'+(this.compareB.name||'B')+'</h2><table><thead><tr><th>Agent</th><th>Retainer</th></tr></thead><tbody>'+this.compareB.agents.map(a=>'<tr><td>'+a.name+'</td><td>$'+fmtN(a.retainerNum||0)+'/mo</td></tr>').join('')+'</tbody></table></div></div>');
      w.document.write('<div class="summary"><h2>Summary</h2><div class="row" style="font-weight:700;color:#888;font-size:10px"><span></span><span>'+(this.compareA.name||'A')+'</span><span>'+(this.compareB.name||'B')+'</span></div><div class="row"><span class="metric">Agents</span><span class="val">'+this.compareA.agents.length+'</span><span class="val">'+this.compareB.agents.length+'</span></div><div class="row"><span class="metric">Setup low</span><span class="val">$'+fmtN(this.compareSetupLow('A'))+'</span><span class="val">$'+fmtN(this.compareSetupLow('B'))+'</span></div><div class="row"><span class="metric">Retainer</span><span class="val">$'+fmtN(this.compareRetainer('A'))+'/mo</span><span class="val">$'+fmtN(this.compareRetainer('B'))+'/mo</span></div><div class="row"><span class="metric">Hours/mo</span><span class="val">'+rA.hours+'h</span><span class="val">'+rB.hours+'h</span></div><div class="row"><span class="metric">Avg ROI</span><span class="val">'+rA.roi+'x</span><span class="val">'+rB.roi+'x</span></div><div class="row"><span class="metric">Payback</span><span class="val">'+rA.payback+' mo</span><span class="val">'+rB.payback+' mo</span></div></div>');
      w.document.write('<div style="margin-top:16px;font-size:9px;color:#aaa;display:flex;justify-content:space-between"><span>SWL Consulting</span><span>'+this.today()+'</span></div></body></html>');
      w.document.close();setTimeout(()=>{w.focus();w.print();},500);
    },
    exportExcel(){
      const XLSX=window.XLSX;if(!XLSX){alert('SheetJS not loaded');return;}

          this.savedProjects=(d.sp||[]).map(p=>({...p,_showVersions:false}));
          this.currentProjectId=d.cpid||null;
          this.customLogo=d.logo||'';this.logoUrlInput=d.logo||'';
          if(d.imgs)this.pillars.forEach(p=>{if(d.imgs[p.id])p.img=d.imgs[p.id];});
          if(d.meta)this.pdfMeta=Object.assign(this.pdfMeta,d.meta);
          if(d.disc)this.discounts=d.disc;else this.discounts=this._defDisc(this.pillars);
          if(d.pkgs)this.packages=d.pkgs;else this.packages=this._defPkgs();
          if(d.defTerms)this.defaultTerms=d.defTerms;
          if(d.commitment)this.commitment=d.commitment;
          if(d.activePkgId!==undefined)this.activePackageId=d.activePkgId;
        }else{this.pillars=pils;this.discounts=this._defDisc(pils);this.packages=this._defPkgs();}
      }catch(e){this.pillars=pils;this.discounts=this._defDisc(pils);this.packages=this._defPkgs();}
      this.$watch('quote',()=>this.persist(),{deep:true});
      this.$watch('projectName',()=>this.persist());
      this.$watch('savedProjects',()=>this.persist(),{deep:true});
      this.$watch('customLogo',()=>this.persist());
      this.$watch('pdfMeta',()=>this.persist(),{deep:true});
      this.$watch('discounts',()=>this.persist(),{deep:true});
      this.$watch('packages',()=>this.persist(),{deep:true});
      this.$watch('defaultTerms',()=>this.persist(),{deep:true});
      this.$watch('commitment',()=>this.persist());
      this.$watch('activePackageId',()=>this.persist());
      this.$watch('pillars',()=>this.persist(),{deep:true});
    }
  };
}
</script>
